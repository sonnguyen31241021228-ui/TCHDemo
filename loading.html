<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đang tìm quán...</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      background: linear-gradient(#3c2f2f, #5c4033); 
      color: white; 
      font-family: system-ui, -apple-system, sans-serif;
    }
    .coffee { 
      animation: steam 2.5s infinite ease-in-out; 
    }
    @keyframes steam { 
      0% { transform: translateY(0); }
      50% { transform: translateY(-25px); }
      100% { transform: translateY(0); }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center text-center px-6">
  
  <div class="mb-12">
    <div class="text-8xl mb-6 coffee">☕</div>
    <h1 class="text-3xl font-bold tracking-wider">THE COFFEE HOUSE</h1>
  </div>

  <div id="status" class="text-xl font-medium mb-10 h-8">Finding your best place...</div>

  <!-- Progress Bar -->
  <div class="w-80 h-2.5 bg-white/30 rounded-full overflow-hidden mb-8">
    <div id="progress" class="h-full bg-gradient-to-r from-amber-400 via-orange-400 to-yellow-300 w-0 transition-all duration-[4200ms] ease-linear"></div>
  </div>

  <p class="text-sm opacity-75">Powered by The Coffee House AI</p>

  <script>
    const messages = [
      "Finding your best place...",
      "Checking live occupancy...",
      "Looking for available seats...",
      "Estimate waiting times..."
    ];
    
    let index = 0;
    const statusEl = document.getElementById('status');
    const progressEl = document.getElementById('progress');

    // Bắt đầu progress
    progressEl.style.width = '100%';

    // Đổi thông báo mỗi 1 giây
    const interval = setInterval(() => {
      index = (index + 1) % messages.length;
      statusEl.textContent = messages[index];
    }, 1050);

    // Tự động chuyển sang result.html sau 4.5 giây
    setTimeout(() => {
      clearInterval(interval);
      window.location.href = "result.html";
    }, 4500);
  </script>
</body>
</html>

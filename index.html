<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Coffee House</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#fff9f0]">
  <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl overflow-hidden">

    <!-- Header -->
    <div class="bg-white p-5 flex justify-between items-center border-b">
      <div class="flex items-center gap-3">
        <span class="text-4xl">☕</span>
        <div>
          <p class="font-semibold text-lg">THE COFFEE HOUSE</p>
        </div>
      </div>
      <div class="flex items-center gap-5">
        <div class="bg-amber-100 text-amber-800 px-4 py-1.5 rounded-2xl text-sm font-medium flex items-center gap-1">
          🎟️ 15
        </div>
        <i class="fa-solid fa-bell text-2xl text-gray-700"></i>
      </div>
    </div>

    <div class="p-6">
      <p class="text-amber-800">Chào buổi sáng! Cà Phê nhé!</p>

      <!-- Nhà Button -->
      <a href="planner.html" 
         class="block mt-10 bg-gradient-to-br from-amber-600 to-orange-600 text-white rounded-3xl p-8 shadow-xl">
        <div class="flex items-center gap-5">
          <div class="text-6xl">🏠</div>
          <div>
            <p class="text-2xl font-bold">Nhà</p>
            <p class="mt-1 opacity-90">Tìm quán hợp nhất cho bạn ngay lúc này</p>
          </div>
        </div>
      </a>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t py-4 flex justify-around text-xs font-medium">
      <div class="flex flex-col items-center text-amber-600">
        <i class="fa-solid fa-house text-2xl"></i>
        <span>Trang chủ</span>
      </div>
      <div class="flex flex-col items-center text-gray-500">
        <i class="fa-solid fa-mug-hot text-2xl"></i>
        <span>Đặt hàng</span>
      </div>
      <div class="flex flex-col items-center text-gray-500">
        <i class="fa-solid fa-store text-2xl"></i>
        <span>Cửa hàng</span>
      </div>
      <div class="flex flex-col items-center text-gray-500">
        <i class="fa-solid fa-gift text-2xl"></i>
        <span>Ưu đãi</span>
      </div>
    </div>
  </div>
</body>
</html>

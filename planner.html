<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nhà - The Coffee House</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#fff9f0] min-h-screen">
  <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl">

    <!-- Header -->
    <div class="p-5 border-b flex items-center gap-4 bg-white sticky top-0">
      <a href="index.html" class="text-3xl">←</a>
      <h1 class="font-bold text-2xl">Nhà</h1>
    </div>

    <div class="p-6 space-y-10">

      <!-- Current Location -->
      <div>
        <p class="text-sm font-medium text-gray-500 mb-2">VỊ TRÍ HIỆN TẠI</p>
        <div class="bg-amber-50 p-5 rounded-3xl">
          <p class="font-semibold">Quận 1, TP. Hồ Chí Minh</p>
          <p class="text-sm text-gray-600">Cách UEH cơ sở 8 khoảng 1.2km</p>
        </div>
      </div>

      <!-- Preferred Area -->
      <div>
        <p class="text-sm font-medium text-gray-500 mb-3">KHU VỰC ƯA THÍCH</p>
        <select class="w-full p-5 border border-gray-200 rounded-3xl text-lg">
          <option>Quận 1</option>
          <option>Quận 3</option>
          <option>Quận 5</option>
          <option>Quận 7</option>
          <option>Quận 10</option>
          <option>Quận Phú Nhuận</option>
        </select>
      </div>

      <!-- Drink Preference -->
      <div>
        <p class="text-sm font-medium text-gray-500 mb-3">THỨC UỐNG YÊU THÍCH</p>
        <div class="grid grid-cols-3 gap-3">
          <button class="p-6 border-2 border-amber-200 hover:border-amber-600 rounded-3xl transition">☕ Cà Phê</button>
          <button class="p-6 border-2 border-amber-200 hover:border-amber-600 rounded-3xl transition">🍵 Matcha</button>
          <button class="p-6 border-2 border-amber-200 hover:border-amber-600 rounded-3xl transition">🧋 Trà sữa</button>
        </div>
      </div>

      <!-- Group Size -->
      <div>
        <p class="text-sm font-medium text-gray-500 mb-3">SỐ LƯỢNG NGƯỜI</p>
        <div class="grid grid-cols-4 gap-3">
          <button class="p-4 border rounded-3xl text-center hover:bg-amber-50">1<br><span class="text-xs">Một mình</span></button>
          <button class="p-4 border rounded-3xl text-center hover:bg-amber-50">2-3<br><span class="text-xs">Nhỏ</span></button>
          <button class="p-4 border rounded-3xl text-center hover:bg-amber-50">4-6<br><span class="text-xs">Nhóm</span></button>
          <button class="p-4 border rounded-3xl text-center hover:bg-amber-50">7+<br><span class="text-xs">Lớn</span></button>
        </div>
      </div>
    </div>

    <!-- Big Button -->
    <div class="p-6 fixed bottom-0 left-0 right-0 max-w-md mx-auto">
      <button onclick="goToLoading()" 
              class="w-full py-7 bg-gradient-to-r from-orange-500 to-amber-600 text-white text-2xl font-semibold rounded-3xl shadow-lg active:scale-95 transition">
        Tìm quán phù hợp nhất +
      </button>
    </div>
  </div>

  <script>
    function goToLoading() {
      window.location.href = "loading.html";
    }
  </script>
</body>
</html>
